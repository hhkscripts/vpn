name: Deploy Telegram Bot

on:
  push:
    branches: [ "main" ]
    paths:
      - 'telegrambot/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout code to workspace
        uses: actions/checkout@v4
        with:
          # For self-hosted runners, ensure we're in the correct directory
          path: '.'
          # Fetch all history to ensure proper state
          fetch-depth: 0

      - name: Ensure clean git state
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git reset --hard origin/main
          git clean -fd

      - name: Create .env file from Secrets
        run: |
          cd telegrambot
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
          if [ -n "${{ secrets.TELEGRAM_ALLOWED_USERS }}" ]; then
            echo "TELEGRAM_ALLOWED_USERS=${{ secrets.TELEGRAM_ALLOWED_USERS }}" >> .env
          fi
          # Debug: Show allowed users count (not values)
          if [ -n "${{ secrets.TELEGRAM_ALLOWED_USERS }}" ]; then
            USER_COUNT=$(echo "${{ secrets.TELEGRAM_ALLOWED_USERS }}" | tr ',' '\n' | wc -l)
            echo "Configured for $USER_COUNT authorized users."
          fi

      - name: Build and Run with Docker Compose
        run: |
          cd telegrambot
          docker compose down || true
          docker compose up -d --build
          docker compose logs -f &
          sleep 5
          docker compose ps

      - name: Verify Deployment
        run: |
          cd telegrambot
          if docker compose ps | grep -q "Up"; then
            echo "✅ Telegram Bot deployed successfully!"
          else
            echo "❌ Deployment failed or container not running."
            docker compose logs
            exit 1
          fi