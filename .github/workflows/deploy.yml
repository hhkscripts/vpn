name: Deploy Telegram Bot

on:
  workflow_run:
    workflows: ["Quality"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout workflow scripts
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest source on Pi runner
        run: bash scripts/github-runner-pull.sh

      - name: Create .env file from Secrets
        working-directory: /home/hhk/Projects/vpn
        run: |
          cd telegrambot
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
          if [ -n "${{ secrets.TELEGRAM_ALLOWED_USERS }}" ]; then
            echo "TELEGRAM_ALLOWED_USERS=${{ secrets.TELEGRAM_ALLOWED_USERS }}" >> .env
          fi
          # Debug: Show allowed users count (not values)
          if [ -n "${{ secrets.TELEGRAM_ALLOWED_USERS }}" ]; then
            USER_COUNT=$(echo "${{ secrets.TELEGRAM_ALLOWED_USERS }}" | tr ',' '\n' | wc -l)
            echo "Configured for $USER_COUNT authorized users."
          fi

      - name: Build and Run with Docker Compose
        working-directory: /home/hhk/Projects/vpn
        run: |
          cd telegrambot
          docker compose down --remove-orphans || true
          docker compose up -d --build
          docker compose logs --tail=80
          sleep 5
          docker compose ps

      - name: Verify Deployment
        working-directory: /home/hhk/Projects/vpn
        run: |
          cd telegrambot
          if docker compose ps | grep -q "Up"; then
            echo "✅ Telegram Bot deployed successfully!"
          else
            echo "❌ Deployment failed or container not running."
            docker compose logs
            exit 1
          fi
