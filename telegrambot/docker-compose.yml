services:
  mpxhotspotbot:
    build: .
    container_name: mpxhotspotbot
    restart: unless-stopped
    network_mode: "host"
    privileged: true
    pid: "host"
    ipc: "host"
    uts: "host"
    environment:
      - TZ=Asia/Yangon
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - BOT_HEALTH_HOST=0.0.0.0
      - BOT_HEALTH_PORT=8081
    volumes:
      - /:/host:rw
      - /var/run/dbus:/var/run/dbus
      - /run/systemd:/run/systemd
      - /var/run/docker.sock:/var/run/docker.sock
      - ./hotspot-manager.py:/app/hotspot-manager.py:ro
      - ./bot.py:/app/bot.py:ro
      - /etc/hostapd:/etc/hostapd
      - /etc/dnsmasq.d:/etc/dnsmasq.d
      - /etc/dnsmasq.conf:/etc/dnsmasq.conf
      - /run/xtables.lock:/run/xtables.lock
      - /lib/modules:/lib/modules:ro
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - NET_RAW
    working_dir: /host/home/hhk/Projects/vpn/telegrambot
    command: >
      bash -c "
        export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin &&
        cd /host/home/hhk/Projects/vpn/telegrambot &&
        exec python3 bot.py
      "
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/bot-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
