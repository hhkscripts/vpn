services:
  telegrambot:
    build: .
    container_name: telegrambot
    restart: unless-stopped
    network_mode: "host"
    privileged: true
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
    volumes:
      - /var/run/dbus:/var/run/dbus
      - /etc/systemd:/etc/systemd